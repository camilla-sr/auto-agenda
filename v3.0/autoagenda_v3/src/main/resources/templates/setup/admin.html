<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuração - Criar Administrador</title>
	<link rel="icon" href="/img/padrao_favicon.ico" type="image/x-icon">
    <link href="/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="/css/variaveis.css">
    <link rel="stylesheet" href="/css/autenticacao.css">
    <script src="/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/js/inputmask.min.js"></script>
    <script src="/js/sweetalert2.all.min.js"></script>
</head>

<body>
    <div class="auth-card auth-card-lg">
        <div class="header-center">
            <div class="setup-step-text">Passo 2 de 2</div>
            <h3 class="auth-title-page">Criar Usuário Administrador</h3>
            <p class="auth-subtitle">Este usuário terá acesso total ao sistema da oficina.</p>
        </div>

        <div th:if="${erro}" class="alert alert-danger text-center" role="alert">
            <i class="fa-solid fa-circle-exclamation me-2"></i> <span th:text="${erro}"></span>
        </div>

        <form method="post" th:action="@{/setup/admin}" th:object="${funcionario}" id="formAdmin">
            <input type="hidden" name="idOficina" th:value="${idOficina}">
            <div class="row">
                <div class="col-md-6 border-end border-secondary pe-md-4">
                    <div class="mb-3">
                        <label class="form-label">Nome Completo</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                            <input type="text" id="nomeFuncionario" th:field="*{nomeFuncionario}" class="form-control" required placeholder="Ex: João da Silva">
                            <div id="nome-feedback" class="invalid-feedback">Digite nome e sobrenome.</div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">CPF</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-id-card"></i></span>
                            <input type="text" id="cpf" th:field="*{cpf}" class="form-control" required placeholder="000.000.000-00">
                            <div id="cpf-feedback" class="invalid-feedback">CPF Inválido.</div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">E-mail de Acesso</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                            <input type="email" id="email" th:field="*{email}" class="form-control" required placeholder="admin@oficina.com">
                            <div id="email-feedback" class="invalid-feedback">E-mail inválido.</div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Telefone / Celular</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-phone"></i></span>
                            <input type="text" id="telefone" th:field="*{telefone}" class="form-control" required placeholder="(99) 99999-9999">
                            <div id="telefone-feedback" class="invalid-feedback">Telefone incompleto.</div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6 ps-md-4 mt-3 mt-md-0">
                    <div class="mb-3">
                        <label class="form-label">Usuário</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-at"></i></span>
                            <input type="text" id="usuario" th:field="*{usuario}" class="form-control" required placeholder="Sem espaços">
                            <div id="usuario-feedback" class="invalid-feedback">Não pode conter espaços.</div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" id="senha" th:field="*{senha}" class="form-control" required placeholder="Mínimo 6 caracteres">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Confirmar Senha</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-check"></i></span>
                            <input type="password" id="confirmaSenha" class="form-control" required placeholder="Repita a senha">
                            <div id="senha-feedback" class="invalid-feedback">As senhas não coincidem.</div>
                        </div>
                    </div>
                </div>
            </div>

            <hr class="border-secondary my-4" style="opacity: 0.3;">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <small class="text-muted"><i class="fa-solid fa-shield-halved text-warning"></i> Acesso Nível: <strong>ADMIN</strong></small>
                
                <button type="submit" class="btn btn-sucesso px-5 py-2">
                    Finalizar Instalação <i class="fa-solid fa-check-circle ms-2"></i>
                </button>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Elementos
            const form = document.getElementById('formAdmin');
            const nomeInput = document.getElementById('nomeFuncionario');
            const nomeFeedback = document.getElementById('nome-feedback');
            const cpfInput = document.getElementById('cpf');
            const cpfFeedback = document.getElementById('cpf-feedback');
            const emailInput = document.getElementById('email');
            const emailFeedback = document.getElementById('email-feedback');
            const telefoneInput = document.getElementById('telefone');
            const telefoneFeedback = document.getElementById('telefone-feedback');
            const usuarioInput = document.getElementById('usuario');
            const usuarioFeedback = document.getElementById('usuario-feedback');
            const senhaInput = document.getElementById('senha');
            const confirmaInput = document.getElementById('confirmaSenha');
            const senhaFeedback = document.getElementById('senha-feedback');

            // --- 1. VALIDAÇÃO DE NOME ---
            function obterErroNome(nome) {
                const valor = nome.trim();
                if (valor.length === 0) return "Nome é obrigatório.";
                const partes = valor.split(' ').filter(parte => parte.length > 0);
                if (partes.length < 2) return "Digite seu nome e sobrenome.";
                if (partes[0].length < 2) return "Nome muito curto.";
                return null;
            }

            if (nomeInput && nomeFeedback) {
                nomeInput.addEventListener('input', function() {
                    this.classList.remove('is-invalid');
                    nomeFeedback.style.display = 'none';
                });
                nomeInput.addEventListener('blur', function() {
                    const erro = obterErroNome(this.value);
                    if (erro) {
                        this.classList.add('is-invalid');
                        nomeFeedback.textContent = erro;
                        nomeFeedback.style.display = 'block';
                    }
                });
            }

            // --- 2. VALIDAÇÃO DE USUÁRIO ---
            if (usuarioInput && usuarioFeedback) {
                usuarioInput.addEventListener('input', function() {
                    if (this.value.includes(" ")) {
                        this.value = this.value.replace(/\s/g, "");
                        this.classList.add('is-invalid');
                        usuarioFeedback.style.display = 'block';
                        
                        // Esconde erro após 2 segundos
                        setTimeout(() => {
                            if(!this.value.includes(" ")) {
                                this.classList.remove('is-invalid');
                                usuarioFeedback.style.display = 'none';
                            }
                        }, 2000);
                    } else {
                        this.classList.remove('is-invalid');
                        usuarioFeedback.style.display = 'none';
                    }
                });
            }

            // --- 3. MÁSCARAS E VALIDAÇÃO CPF/TELEFONE ---
            if(typeof Inputmask !== 'undefined'){
                Inputmask("999.999.999-99").mask(cpfInput);
                
                // Suporta 8 ou 9 dígitos de forma fluida
                Inputmask({
                    mask: ["(99) 9999-9999", "(99) 99999-9999"],
                    keepStatic: true
                }).mask(telefoneInput);
            }

            function validarCPF(cpf) {
                cpf = cpf.replace(/[^\d]+/g,'');
                if(cpf == '') return false;
                if (cpf.length != 11 || /^(\d)\1+$/.test(cpf)) return false;
                let soma = 0, resto;
                for (let i = 1; i <= 9; i++) soma += parseInt(cpf.substring(i-1, i)) * (11 - i);
                resto = (soma * 10) % 11;
                if ((resto == 10) || (resto == 11))  resto = 0;
                if (resto != parseInt(cpf.substring(9, 10)) ) return false;
                soma = 0;
                for (let i = 1; i <= 10; i++) soma += parseInt(cpf.substring(i-1, i)) * (12 - i);
                resto = (soma * 10) % 11;
                if ((resto == 10) || (resto == 11))  resto = 0;
                if (resto != parseInt(cpf.substring(10, 11) ) ) return false;
                return true;
            }

            if (cpfInput && cpfFeedback) {
                cpfInput.addEventListener('input', function() {
                    this.classList.remove('is-invalid', 'is-valid');
                    cpfFeedback.style.display = 'none';
                });

                cpfInput.addEventListener('blur', function() {
                    if(!validarCPF(this.value)) {
                        this.classList.add('is-invalid');
                        cpfFeedback.style.display = 'block';
                    } else {
                        this.classList.add('is-valid');
                        this.classList.remove('is-invalid');
                        cpfFeedback.style.display = 'none';
                    }
                });
            }

            if (telefoneInput && telefoneFeedback) {
                telefoneInput.addEventListener('input', function() {
                    this.classList.remove('is-invalid');
                    telefoneFeedback.style.display = 'none';
                });

                telefoneInput.addEventListener('blur', function() {
                    const numeros = this.value.replace(/\D/g, '');
                    if (numeros.length > 0 && numeros.length < 10) { // Menos de 10 dígitos (DDD + 8)
                        this.classList.add('is-invalid');
                        telefoneFeedback.style.display = 'block';
                    } else if (numeros.length >= 10) {
                        this.classList.add('is-valid');
                    }
                });
            }

            // --- 4. VALIDAÇÃO DE E-MAIL ---
            if (emailInput && emailFeedback) {
                emailInput.addEventListener('input', function() {
                    this.value = this.value.replace(/\s/g, "");
                    this.classList.remove('is-invalid');
                    emailFeedback.style.display = 'none';
                });

                emailInput.addEventListener('blur', function() {
                    const email = this.value;
                    if (email === "") return;

                    let msgErro = "";
                    let valido = true;
                    const partes = email.split('@');

                    if (partes.length !== 2 || !partes[0] || !partes[1]) {
                        valido = false; msgErro = "Formato inválido.";
                    } else if (!partes[1].includes('.')) {
                        valido = false; msgErro = "Falta o domínio.";
                    }

                    if (!valido) {
                        this.classList.add('is-invalid');
                        emailFeedback.textContent = msgErro;
                        emailFeedback.style.display = 'block';
                    } else {
                        this.classList.add('is-valid');
                    }
                });
            }

            // --- 5. VALIDAÇÃO DE SENHAS ---
            function checarSenhas() {
                if (confirmaInput.value && senhaInput.value !== confirmaInput.value) {
                    confirmaInput.classList.add('is-invalid');
                    if(senhaFeedback) senhaFeedback.style.display = 'block';
                    return false;
                } else {
                    confirmaInput.classList.remove('is-invalid');
                    if (confirmaInput.value) confirmaInput.classList.add('is-valid');
                    if(senhaFeedback) senhaFeedback.style.display = 'none';
                    return true;
                }
            }

            confirmaInput.addEventListener('input', checarSenhas);
            senhaInput.addEventListener('input', () => {
                if(confirmaInput.value) checarSenhas();
            });

            // --- SUBMIT FINAL ---
            form.addEventListener('submit', function(e) {
                let temErro = false;

                const erroNome = obterErroNome(nomeInput.value);
                if (erroNome) {
                    nomeInput.classList.add('is-invalid');
                    nomeFeedback.textContent = erroNome;
                    nomeFeedback.style.display = 'block';
                    temErro = true;
                }

                if (!validarCPF(cpfInput.value)) {
                    cpfInput.classList.add('is-invalid');
                    cpfFeedback.style.display = 'block';
                    temErro = true;
                }
                
                const numsTelefone = telefoneInput.value.replace(/\D/g, '');
                if (numsTelefone.length < 10) {
                    telefoneInput.classList.add('is-invalid');
                    telefoneFeedback.style.display = 'block';
                    temErro = true;
                }

                if (!checarSenhas()) temErro = true;
                if (emailInput.classList.contains('is-invalid')) temErro = true;

                if (temErro) {
                    e.preventDefault();
                    if(typeof Swal !== 'undefined') {
                        Swal.fire({
                            icon: 'warning',
                            title: 'Atenção',
                            text: 'Verifique os campos destacados em vermelho.',
                            background: '#212529',
                            color: '#fff',
                            confirmButtonColor: '#FFD700'
                        });
                    } else {
                        alert("Verifique os erros.");
                    }
                } else {
                    cpfInput.value = cpfInput.value.replace(/\D/g, ''); // Limpa máscara do CPF antes de enviar
                }
            });
        });
    </script>
</body>
</html>
