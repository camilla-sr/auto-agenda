<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Novo Funcionário</title>
    
    <link rel="icon" type="image/png" th:href="@{${branding.faviconUrl}}" />
    
    <link href="/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/fontawesome/css/all.min.css">
    <script src="/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/js/inputmask.min.js"></script>
    <script src="/js/sweetalert2.all.min.js"></script>
	
    <link rel="stylesheet" href="/css/variaveis.css">
	<link rel="stylesheet" href="/css/autenticacao.css">
</head>

<body>
    <div class="auth-card auth-card-lg">
        
        <img th:src="@{${branding.logoUrl}}" alt="Logo" class="auth-logo-corner">
        
        <h4 class="auth-title-page">Novo Funcionário</h4>

        <form method="post" action="/funcionario-api/salvar" id="formCadastro">
            <input type="hidden" name="cadastroInicial" value="true">
            
            <div class="row">
                <div class="col-md-6 border-end border-secondary pe-md-4 mb-3 mb-md-0">
                    <h6 class="text-primary mb-4"><i class="fa-solid fa-user-tag me-2"></i>Dados Pessoais</h6>
                    
                    <div class="mb-3">
                        <label class="form-label">Nome Completo</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                            <input type="text" id="nomeFuncionario" name="nomeFuncionario" class="form-control" required placeholder="Ex: João da Silva">
                            <div id="nome-feedback" class="invalid-feedback">Digite nome e sobrenome.</div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">CPF</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-id-card"></i></span>
                            <input type="text" id="cpf" name="cpf" class="form-control" required placeholder="000.000.000-00">
                            <div id="cpf-feedback" class="invalid-feedback">CPF Inválido.</div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">E-mail</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                            <input type="email" id="email" name="email" class="form-control" required placeholder="exemplo@oficina.com">
                            <div id="email-feedback" class="invalid-feedback">E-mail inválido.</div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6 ps-md-4 mt-4 mt-md-0">
                    <h6 class="text-primary mb-4"><i class="fa-solid fa-shield-halved me-2"></i>Acesso ao Sistema</h6>

                    <div class="mb-3">
                        <label class="form-label">Usuário (Login)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-at"></i></span>
                            <input type="text" id="usuario" name="usuario" class="form-control" required placeholder="Sem espaços ou acentos">
                            <div id="usuario-feedback" class="invalid-feedback">Não pode conter espaços.</div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" id="senha" class="form-control" required placeholder="Mínimo 6 caracteres">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Confirmar Senha</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-check"></i></span>
                            <input type="password" id="confirmarSenha" class="form-control" required placeholder="Repita a senha">
                            <div id="senha-feedback" class="invalid-feedback">As senhas não coincidem.</div>
                        </div>
                    </div>
                    
                    <input type="hidden" name="senha" id="senhaValida">
                </div>
            </div>

            <hr class="border-secondary my-4" style="opacity: 0.3;">

            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
				<button type="button" class="btnCadastro"
					th:onclick="|window.location.href='@{/{slug}/login(slug=${oficinaContexto.slug})}'|">
			        Voltar
			    </button>
                
                <button type="submit" class="btn btn-primary">
                    Salvar Cadastro <i class="fa-solid fa-floppy-disk ms-2"></i>
                </button>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('formCadastro');
            const nomeInput = document.getElementById('nomeFuncionario');
            const cpfInput = document.getElementById('cpf');
            const emailInput = document.getElementById('email');
            const usuarioInput = document.getElementById('usuario');
            const senhaInput = document.getElementById('senha');
            const confirmaInput = document.getElementById('confirmarSenha');
            const senhaValidaInput = document.getElementById('senhaValida');

            // Feedbacks
            const nomeFeedback = document.getElementById('nome-feedback');
            const cpfFeedback = document.getElementById('cpf-feedback');
            const emailFeedback = document.getElementById('email-feedback');
            const usuarioFeedback = document.getElementById('usuario-feedback');
            const senhaFeedback = document.getElementById('senha-feedback');

            // --- 1. VALIDAÇÃO DE NOME ---
            function validarNome() {
                const valor = nomeInput.value.trim();
                const partes = valor.split(' ').filter(p => p.length > 0);
                if (valor.length === 0 || partes.length < 2 || partes[0].length < 2) {
                    nomeInput.classList.add('is-invalid');
                    if(nomeFeedback) nomeFeedback.style.display = 'block';
                    return false;
                }
                nomeInput.classList.remove('is-invalid');
                if(nomeFeedback) nomeFeedback.style.display = 'none';
                return true;
            }
            nomeInput.addEventListener('blur', validarNome);
            nomeInput.addEventListener('input', () => nomeInput.classList.remove('is-invalid'));

            // --- 2. VALIDAÇÃO DE E-MAIL ---
            function validarEmail(email) {
                const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return regex.test(email);
            }

            if (emailInput && emailFeedback) {
                emailInput.addEventListener('input', function() {
                    this.value = this.value.replace(/\s/g, ""); 
                    this.classList.remove('is-invalid');
                    emailFeedback.style.display = 'none';
                });

                emailInput.addEventListener('blur', function() {
                    const email = this.value;
                    if (email === "") return; 

                    if (!validarEmail(email)) {
                        this.classList.add('is-invalid');
                        emailFeedback.textContent = "Formato de e-mail inválido";
                        emailFeedback.style.display = 'block';
                    } else {
                        this.classList.remove('is-invalid');
                        this.classList.add('is-valid');
                        emailFeedback.style.display = 'none';
                    }
                });
            }

            // --- 3. MÁSCARA E VALIDAÇÃO CPF ---
            if(typeof Inputmask !== 'undefined') {
                Inputmask("999.999.999-99").mask(cpfInput);
            }
            
            function validarCPF(strCPF) {
                let Soma = 0, Resto;
                strCPF = strCPF.replace(/[^\d]+/g,'');
                if (strCPF == "") return false;
                if (strCPF.length != 11 || /^(\d)\1+$/.test(strCPF)) return false;

                for (let i=1; i<=9; i++) Soma = Soma + parseInt(strCPF.substring(i-1, i)) * (11 - i);
                Resto = (Soma * 10) % 11;
                if ((Resto == 10) || (Resto == 11))  Resto = 0;
                if (Resto != parseInt(strCPF.substring(9, 10)) ) return false;

                Soma = 0;
                for (let i = 1; i <= 10; i++) Soma = Soma + parseInt(strCPF.substring(i-1, i)) * (12 - i);
                Resto = (Soma * 10) % 11;
                if ((Resto == 10) || (Resto == 11))  Resto = 0;
                if (Resto != parseInt(strCPF.substring(10, 11) ) ) return false;
                return true;
            }

            cpfInput.addEventListener('blur', function() {
                if(!validarCPF(this.value)) {
                    this.classList.add('is-invalid');
                    if(cpfFeedback) cpfFeedback.style.display = 'block';
                } else {
                    this.classList.remove('is-invalid');
                    this.classList.add('is-valid');
                    if(cpfFeedback) cpfFeedback.style.display = 'none';
                }
            });

            // --- 4. USUÁRIO ---
            usuarioInput.addEventListener('input', function() {
                if (this.value.includes(" ")) {
                    this.value = this.value.replace(/\s/g, "");
                    this.classList.add('is-invalid');
                    if(usuarioFeedback) usuarioFeedback.style.display = 'block';
                } else {
                    this.classList.remove('is-invalid');
                    if(usuarioFeedback) usuarioFeedback.style.display = 'none';
                }
            });

            // --- 5. SENHAS ---
            function checarSenhas() {
                if (confirmaInput.value && senhaInput.value !== confirmaInput.value) {
                    confirmaInput.classList.add('is-invalid');
                    if(senhaFeedback) senhaFeedback.style.display = 'block';
                    return false;
                }
                if (confirmaInput.value) {
                    confirmaInput.classList.remove('is-invalid');
                    confirmaInput.classList.add('is-valid');
                    if(senhaFeedback) senhaFeedback.style.display = 'none';
                }
                return true;
            }
            confirmaInput.addEventListener('input', checarSenhas);
            senhaInput.addEventListener('input', () => { if(confirmaInput.value) checarSenhas(); });

            // --- SUBMIT ---
            form.addEventListener('submit', function(e) {
                let temErro = false;

                if (!validarNome()) temErro = true;
                if (!validarCPF(cpfInput.value)) { cpfInput.classList.add('is-invalid'); temErro = true; }
                if (emailInput.value && !validarEmail(emailInput.value)) { emailInput.classList.add('is-invalid'); temErro = true; }
                if (!checarSenhas()) temErro = true;

                if (temErro) {
                    e.preventDefault();
                    if(typeof Swal !== 'undefined') {
                        Swal.fire({
                            icon: 'warning',
                            title: 'Atenção',
                            text: 'Verifique os campos destacados em vermelho.',
                            background: '#212529',
                            color: '#fff'
                        });
                    } else {
                        alert("Verifique os erros no formulário");
                    }
                } else {
                    cpfInput.value = cpfInput.value.replace(/\D/g, ''); 
                    senhaValidaInput.value = senhaInput.value;
                }
            });
        });
    </script>
</body>
</html>
