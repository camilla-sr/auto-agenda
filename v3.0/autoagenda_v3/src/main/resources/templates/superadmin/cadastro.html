<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Mestre - Superadmin</title>
    <link rel="icon" type="image/png" href="/img/padrao_favicon.ico"/>
    <link href="/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/fontawesome/css/all.min.css">
    
    <link rel="stylesheet" href="/css/variaveis.css">
    <link rel="stylesheet" href="/css/login_superadmin.css">

</head>
<body>

    <div class="superadmin-card superadmin-card-lg">
        <i class="fa-solid fa-user-plus icon-lock" style="font-size: 2.5rem; margin-bottom: 10px;"></i>
        <h4 class="auth-title">Novo Superadmin</h4>
        <div class="auth-subtitle mb-3">Cadastro de Acesso Mestre</div>

        <div th:if="${erro}" class="alert alert-danger py-2 small text-start mb-3">
            <i class="fa-solid fa-circle-exclamation me-1"></i> <span th:text="${erro}"></span>
        </div>

        <form method="post" action="/superadmin-api/salvar" id="formCadastro" novalidate>
            <input type="hidden" name="cadastroInicial" value="true">

            <div class="log-inputs">
                
                <div class="row g-3 mb-2">
                    <div class="col-md-6">
                        <label class="form-label">Nome Completo</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-font"></i></span>
                            <input type="text" name="nome" id="nome" th:value="${superadmin?.nome}" class="form-control" autocomplete="off">
                            <div class="invalid-feedback" id="erro-nome"></div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">E-mail Oficial</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                            <input type="email" name="email" id="email" th:value="${superadmin?.email}" class="form-control" autocomplete="off">
                            <div class="invalid-feedback" id="erro-email"></div>
                        </div>
                    </div>
                </div>

                <div class="mb-2 mt-3">
                    <label class="form-label">Usuário Mestre (Login)</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-terminal"></i></span>
                        <input type="text" name="usuario" id="usuario" th:value="${superadmin?.usuario}" class="form-control" maxlength="30" autocomplete="off">
                        <div class="invalid-feedback" id="erro-usuario"></div>
                    </div>
                </div>

                <div class="row g-3 mb-2 mt-1">
                    <div class="col-md-6">
                        <label class="form-label">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-key"></i></span>
                            <input type="password" name="senha" id="senha" class="form-control">
                            <div class="invalid-feedback" id="erro-senha">A senha é obrigatória.</div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Confirmar Senha</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-check"></i></span>
                            <input type="password" id="confirmaSenha" class="form-control">
                            <div class="invalid-feedback" id="erro-confirma"></div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-superadmin mt-4">
                    <i class="fa-solid fa-save me-2"></i> Criar Conta Mestre
                </button>

                <div class="text-center mt-3">
                    <a href="/superadmin/login" class="link-mestre">
                        <i class="fa-solid fa-arrow-left me-1"></i> Voltar ao Login
                    </a>
                </div>
            </div>
        </form>
    </div>

    <script src="/js/sweetalert2.all.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('formCadastro');
            const nome = document.getElementById('nome');
            const email = document.getElementById('email');
            const usuario = document.getElementById('usuario');
            const senha = document.getElementById('senha');
            const confirmaSenha = document.getElementById('confirmaSenha');

            // --- Funções Auxiliares de Feedback UI ---
            function mostrarErro(input, mensagem) {
                input.classList.remove('is-valid');
                input.classList.add('is-invalid');
                const feedback = document.getElementById("erro-" + input.id);
                if (feedback) feedback.innerText = mensagem;
            }

            function limparErro(input) {
                input.classList.remove('is-invalid');
            }

            function marcarValido(input) {
                input.classList.remove('is-invalid');
                input.classList.add('is-valid');
            }

            // --- Regras de Validação ---
            
            function validarNome() {
                const valor = nome.value.trim();
                if (valor === "") {
                    mostrarErro(nome, "O nome não pode ficar em branco.");
                    return false;
                }
                const partes = valor.split(/\s+/);
                if (partes.length < 2 || partes[0].length < 2 || partes[1].length < 2) {
                    mostrarErro(nome, "Digite pelo menos nome e sobrenome.");
                    return false;
                }
                marcarValido(nome);
                return true;
            }

            function validarEmail() {
                const valor = email.value.trim();
                if (valor === "") {
                    mostrarErro(email, "O e-mail é obrigatório.");
                    return false;
                }
                if (/\s/.test(valor)) {
                    mostrarErro(email, "O e-mail não pode conter espaços.");
                    return false;
                }
                const regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!regexEmail.test(valor)) {
                    mostrarErro(email, "Formato inválido (ex: contato@email.com).");
                    return false;
                }
                marcarValido(email);
                return true;
            }

            function validarUsuario() {
                let valor = usuario.value;
                
                // Remove espaços instantaneamente durante a digitação
                if (/\s/.test(valor)) {
                    usuario.value = valor.replace(/\s/g, '');
                    valor = usuario.value;
                }

                if (valor.trim() === "") {
                    mostrarErro(usuario, "O usuário é obrigatório.");
                    return false;
                }
                if (valor.length > 30) {
                    mostrarErro(usuario, "Máximo de 30 caracteres excedido.");
                    return false;
                }
                marcarValido(usuario);
                return true;
            }

            function verificarSenhasEmTempoReal() {
                if (confirmaSenha.value === "") {
                    limparErro(confirmaSenha);
                    return false;
                }
                if (senha.value !== confirmaSenha.value) {
                    mostrarErro(confirmaSenha, "As senhas não coincidem.");
                    return false;
                } else {
                    marcarValido(confirmaSenha);
                    marcarValido(senha);
                    return true;
                }
            }

            function dispararAlertaSenhas() {
                if (senha.value !== "" && confirmaSenha.value !== "" && senha.value !== confirmaSenha.value) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Senhas Diferentes',
                        text: 'As senhas digitadas não coincidem. Tente novamente.',
                        background: '#16191c',
                        color: '#fff',
                        confirmButtonColor: '#2196F3'
                    }).then(() => {
                        senha.value = '';
                        confirmaSenha.value = '';
                        limparErro(senha);
                        limparErro(confirmaSenha);
                        senha.classList.remove('is-valid');
                        confirmaSenha.classList.remove('is-valid');
                        senha.focus();
                    });
                    return false;
                }
                return true;
            }

            // --- Gatilhos (Event Listeners) ---
            
            // Blur (quando clica fora): Faz a validação pesada e mostra erro
            nome.addEventListener('blur', validarNome);
            email.addEventListener('blur', validarEmail);
            usuario.addEventListener('blur', validarUsuario);
            confirmaSenha.addEventListener('blur', dispararAlertaSenhas);

            // Input (enquanto digita): Limpa os erros para não atrapalhar, ou faz validações leves
            nome.addEventListener('input', () => { limparErro(nome); nome.classList.remove('is-valid'); });
            email.addEventListener('input', () => { limparErro(email); email.classList.remove('is-valid'); });
            usuario.addEventListener('input', validarUsuario); // Valida no input pra arrancar os espaços
            
            senha.addEventListener('input', () => {
                limparErro(senha);
                senha.classList.remove('is-valid');
                if (confirmaSenha.value !== "") verificarSenhasEmTempoReal();
            });
            
            confirmaSenha.addEventListener('input', verificarSenhasEmTempoReal);

            // --- Interceptação do Submit Final ---
            form.addEventListener('submit', function(e) {
                e.preventDefault(); 

                // Força todas as validações de uma vez
                const isNomeValido = validarNome();
                const isEmailValido = validarEmail();
                const isUsuarioValido = validarUsuario();
                
                let isSenhasValidas = false;
                if (senha.value === "") {
                    mostrarErro(senha, "A senha é obrigatória.");
                } else if (confirmaSenha.value === "") {
                    mostrarErro(confirmaSenha, "Por favor, confirme a senha.");
                } else {
                    isSenhasValidas = dispararAlertaSenhas();
                }

                if (isNomeValido && isEmailValido && isUsuarioValido && isSenhasValidas) {
                    form.submit();
                }
            });
        });
    </script>
	
	<script th:if="${erro}">
	    Swal.fire({
	        icon: 'error',
	        title: 'Ops...',
	        text: '[[${erro}]]',
	        background: '#16191c',
	        color: '#fff',
	        confirmButtonColor: '#2196F3'
	    });
	</script>

</body>
</html>
