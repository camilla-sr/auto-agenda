<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="'Dashboard - ' + ${branding.nomeEmpresa}">Dashboard - AutoAgenda</title>
  <link rel="icon" href="/img/padrao_favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="/fontawesome/css/all.min.css">
  <script src="/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="/js/sweetalert2.all.min.js"></script>
  
  <link rel="stylesheet" href="/css/variaveis.css">
  <link rel="stylesheet" href="/css/dashboard.css">
  <link rel="stylesheet" href="/css/navegacao.css">
</head>
<body>

  <div th:replace="~{fragments/barra :: barra}"></div>

  <main class="main-content">
    <div class="container">
      
      <div class="page-header">
        <h2><i class="fas fa-tachometer-alt"></i> Dashboard</h2>
        <p>Visão geral <span th:text="${branding.nomeEmpresa}">AutoAgenda</span></p>
      </div>
      
      <div class="table-container">
        <div class="table-header">
          <h3><i class="fas fa-calendar-check"></i> Agendamentos</h3>
        </div>
        
        <div class="dashboard-cards-container">
          <div class="stat-card">
            <div class="stat-icon">
              <i class="fas fa-calendar-alt"></i>
            </div>
            <div class="stat-info">
              <h3 th:text="${totalAgenda}">0</h3>
              <p>Total de Agendamentos</p>
            </div>
          </div>
          
          <div class="stat-card">
            <div class="stat-icon">
              <i class="fas fa-clock"></i>
            </div>
            <div class="stat-info">
              <h3 th:text="${agendaPendente}">0</h3>
              <p>Agendamentos Pendentes</p>
            </div>
          </div>
          
          <div class="stat-card success">
            <div class="stat-icon">
              <i class="fas fa-check-circle"></i>
            </div>
            <div class="stat-info">
              <h3 th:text="${agendaConcluido}">0</h3>
              <p>Agendamentos Concluídos</p>
            </div>
          </div>
        </div>
      </div>

      <div class="table-container">
        <div class="table-header">
          <h3><i class="fas fa-box-open"></i> Produtos</h3>
        </div>
        
        <div class="dashboard-cards-container">
          <div class="stat-card">
            <div class="stat-icon">
              <i class="fas fa-boxes"></i>
            </div>
            <div class="stat-info">
              <h3 th:text="${totalProdutos}">0</h3>
              <p>Total de Produtos</p>
            </div>
          </div>
          
          <div class="stat-card warning">
            <div class="stat-icon">
              <i class="fas fa-exclamation-triangle"></i>
            </div>
            <div class="stat-info">
              <h3 th:text="${estoqueBaixo}">0</h3>
              <p>Produtos em Baixo Estoque</p>
            </div>
          </div>
          
          <div class="stat-card">
            <div class="stat-icon">
              <i class="fas fa-dollar-sign"></i>
            </div>
            <div class="stat-info">
              <h3 th:text="'R$ ' + ${precoEstoque}">R$ 0,00</h3>
              <p>Valor Total em Estoque</p>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <div th:replace="~{fragments/footer :: footer}"></div>

  <div class="modal fade" id="modalRedefinirSenha" data-bs-backdrop="static" 
       data-bs-keyboard="false" tabindex="-1" aria-labelledby="modalRedefinirSenhaLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalRedefinirSenhaLabel">
            <i class="fas fa-key"></i> Redefinir sua senha
          </h5>
        </div>
        <div class="modal-body">
          <form id="formRedefinirSenha" method="post" action="/funcionario-api/redefinir-senha">
            <div class="mb-3">
              <label for="novaSenha" class="form-label">Nova Senha</label>
              <input type="password" class="form-control" id="novaSenha" name="novaSenha" 
                     required minlength="6" placeholder="Mínimo 6 caracteres">
            </div>
            <div class="mb-3">
              <label for="confirmarSenha" class="form-label">Confirmar Senha</label>
              <input type="password" class="form-control" id="confirmarSenha" 
                     required minlength="6" placeholder="Digite a senha novamente">
              <small id="senhaFeedback" class="text-danger" style="display:none;"></small>
            </div>
            <button type="submit" class="btn-salvar-senha" id="btnSalvarSenha">
              <i class="fas fa-save"></i> Salvar Senha
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // 1. Lógica do Modal de Senha
      const formRedefinirSenha = document.getElementById('formRedefinirSenha');
      const novaSenha = document.getElementById('novaSenha');
      const confirmarSenha = document.getElementById('confirmarSenha');
      const senhaFeedback = document.getElementById('senhaFeedback');
      const primeiroLogin = [[${usuarioLogado != null ? usuarioLogado.primeiroLogin : false}]];
      
      if (primeiroLogin && formRedefinirSenha) {
        const modal = new bootstrap.Modal(document.getElementById('modalRedefinirSenha'));
        modal.show();
        // Adiciona classe para blur no fundo (backdrop)
        const backdrop = document.querySelector('.modal-backdrop');
        if(backdrop) backdrop.classList.add('modal-backdrop-blur');
      }
      
      function validarEquivalencia() {
        if (!confirmarSenha.value) {
            senhaFeedback.style.display = 'none';
            confirmarSenha.classList.remove('is-invalid');
            return true;
        }
        
        if (novaSenha.value !== confirmarSenha.value) {
          senhaFeedback.textContent = 'As senhas não coincidem';
          senhaFeedback.style.display = 'block';
          confirmarSenha.classList.add('is-invalid');
          return false;
        } else {
          senhaFeedback.style.display = 'none';
          confirmarSenha.classList.remove('is-invalid');
          return true;
        }
      }
      
      if(confirmarSenha) confirmarSenha.addEventListener('input', validarEquivalencia);
      if(novaSenha) novaSenha.addEventListener('input', () => { 
          if(confirmarSenha.value) validarEquivalencia(); 
      });
      
      if (formRedefinirSenha) {
        formRedefinirSenha.addEventListener('submit', function(e) {
          if (!validarEquivalencia() || novaSenha.value.length < 6) {
            e.preventDefault();
            Swal.fire({
              icon: 'error',
              title: 'Erro',
              text: 'Verifique se as senhas coincidem e têm no mínimo 6 caracteres.',
              confirmButtonColor: '#FFD700' // Usando o HEX direto aqui pois Swal é JS, não pega CSS var fácil
            });
          }
        });
      }

      // 2. Lógica do Menu Hambúrguer (Mobile)
      const hamburgerMenu = document.getElementById('hamburger-menu');
      const navMenu = document.getElementById('nav-menu');

      if (hamburgerMenu && navMenu) {
        hamburgerMenu.addEventListener('click', function() {
          navMenu.classList.toggle('active');
          hamburgerMenu.classList.toggle('active');
        });
        
        // Fechar ao clicar fora
        document.addEventListener('click', function(event) {
            if (!navMenu.contains(event.target) && !hamburgerMenu.contains(event.target)) {
                navMenu.classList.remove('active');
            }
        });
      }
    });
  </script>
</body>
</html>
