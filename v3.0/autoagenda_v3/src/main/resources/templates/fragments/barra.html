<div th:fragment="barra">
	<header class="header">
		<div class="container">
			<div class="logo">
                <a th:href="@{/{slug}(slug=${oficinaContexto.slug})}" class="logo-link">
					<h1><span class="logo-highlight" th:text="${branding.nomeEmpresa}"></span></h1>
				</a>
			</div>

			<button class="hamburger-menu" id="hamburger-menu" aria-label="Menu" aria-controls="nav-menu" aria-expanded="false">
				<span class="hamburger-line"></span>
				<span class="hamburger-line"></span>
				<span class="hamburger-line"></span>
			</button>

			<nav class="nav-menu" id="nav-menu">
				<div class="nav-item">
					<a th:href="@{/{slug}/agendamentos(slug=${oficinaContexto.slug})}" class="nav-link" th:classappend="${currentUri != null and currentUri.contains('/agendamentos') ? 'active' : ''}"><i class="fas fa-calendar-check"></i>Agendamentos</a>
				</div>
				<div class="nav-item">
					<a th:href="@{/{slug}/servicos(slug=${oficinaContexto.slug})}" class="nav-link" th:classappend="${currentUri != null and currentUri.contains('/servicos') ? 'active' : ''}"><i class="fas fa-tools"></i>Serviços</a>
				</div>
				<div class="nav-item" th:if="${oficinaContexto.usarProdutos}">
					<a th:href="@{/{slug}/produtos(slug=${oficinaContexto.slug})}" class="nav-link" th:classappend="${currentUri != null and currentUri.contains('/produtos') ? 'active' : ''}"><i class="fas fa-box-open"></i>Produtos</a>
				</div>
				<div class="nav-item">
					<a th:href="@{/{slug}/clientes(slug=${oficinaContexto.slug})}" class="nav-link" th:classappend="${currentUri != null and currentUri.contains('/clientes') ? 'active' : ''}"><i class="fas fa-users"></i>Clientes</a>
				</div>
				<div class="nav-item dropdown">
					<a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
						<i class="fas fa-user"></i>Usuário
					</a>
					<ul class="dropdown-menu">
						<li th:if="${usuarioLogado != null and usuarioLogado.acesso == 'admin'}">
							<a class="dropdown-item" th:href="@{/{slug}/funcionarios(slug=${oficinaContexto.slug})}">
								<i class="fas fa-address-card"></i>Funcionários
							</a>
							<a class="dropdown-item" th:href="@{/{slug}/painel(slug=${oficinaContexto.slug})}">
								<i class="fas fa-gear"></i>Configurações
							</a>
						</li>
						<li>
							<a class="dropdown-item" th:href="@{/{slug}/perfil(slug=${oficinaContexto.slug})}">
								<i class="fas fa-user-gear"></i>Perfil
							</a>							
						</li>
						<li>
							<hr class="dropdown-divider">
						</li>
						<li>
                            <a class="dropdown-item" th:href="@{/{slug}/logout(slug=${oficinaContexto.slug})}">
								<i class="fas fa-sign-out-alt"></i>Sair
							</a>
						</li>
					</ul>
				</div>
			</nav>
		</div>
	</header>
</div>
